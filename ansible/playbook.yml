---
- name: Deploy CV Builder on web server
  hosts: all
  become: true
  gather_facts: false
  vars:
    cv_repo_url: "https://github.com/MrBrosh/Cv-Builder.git"
    cv_repo_branch: "main"
    cv_app_dir: "/opt/cv-builder"
    cv_web_root: "/opt/cv-builder/client/dist"
    cv_api_port: 3000
    gemini_api_key: "{{ lookup('env', 'GEMINI_API_KEY') | default('', true) }}"

  tasks:
    - name: Wait for SSH to become available
      wait_for_connection:
        delay: 5
        timeout: 300

    - name: Gather facts
      setup:

    - name: Install system packages
      apt:
        name:
          - nginx
          - git
          - curl
          - ca-certificates
          - gnupg
        state: present
        update_cache: yes

    - name: Install Node.js 20 (NodeSource)
      shell: curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js packages
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: Ensure app directory exists
      file:
        path: "{{ cv_app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Clone CV Builder repository
      git:
        repo: "{{ cv_repo_url }}"
        version: "{{ cv_repo_branch }}"
        dest: "{{ cv_app_dir }}"
        force: true
      become_user: ubuntu

    - name: Point frontend API calls to same-origin /api
      replace:
        path: "{{ cv_app_dir }}/client/src/lib/api.ts"
        regexp: "baseURL: 'http://localhost:3000/api'"
        replace: "baseURL: '/api'"
      become_user: ubuntu

    - name: Skip strict tsc gate for production build (unused-vars in upstream repo)
      replace:
        path: "{{ cv_app_dir }}/client/package.json"
        regexp: '"build": "tsc --noEmit && vite build"'
        replace: '"build": "vite build"'
      become_user: ubuntu

    - name: Deploy server environment file
      template:
        src: server.env.j2
        dest: "{{ cv_app_dir }}/server/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"

    - name: Install npm dependencies (root, client, server)
      command: npm run install:all
      args:
        chdir: "{{ cv_app_dir }}"
      become_user: ubuntu
      environment:
        HOME: "/home/ubuntu"

    - name: Build React client for production
      command: npm run build
      args:
        chdir: "{{ cv_app_dir }}/client"
      become_user: ubuntu
      environment:
        HOME: "/home/ubuntu"
        NODE_OPTIONS: "--max-old-space-size=768"

    - name: Build Node.js server for production
      command: npm run build
      args:
        chdir: "{{ cv_app_dir }}/server"
      become_user: ubuntu
      environment:
        HOME: "/home/ubuntu"

    - name: Install systemd unit for CV Builder API
      template:
        src: cv-builder.service.j2
        dest: /etc/systemd/system/cv-builder.service
        mode: "0644"

    - name: Enable and start CV Builder API
      systemd:
        name: cv-builder
        enabled: true
        state: restarted
        daemon_reload: true

    - name: Configure Nginx for CV Builder
      template:
        src: nginx-cv-builder.conf.j2
        dest: /etc/nginx/sites-available/cv-builder
        mode: "0644"

    - name: Disable default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Enable CV Builder Nginx site
      file:
        src: /etc/nginx/sites-available/cv-builder
        dest: /etc/nginx/sites-enabled/cv-builder
        state: link

    - name: Reload Nginx
      service:
        name: nginx
        enabled: true
        state: reloaded
